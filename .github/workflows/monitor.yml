name: YouTube Monitor Automation

on:
  schedule:
    # 嘗試分散時間點，減少被 GitHub 延遲的機率
    - cron: '5,20,35,50 * * * *'
  push:
    branches:
      - main
  workflow_dispatch: # 保持手動觸發

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    # 提前採用 Node.js 24 以消除 Deprecation 警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Monitoring Script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          DISCORD_WEBHOOK_A: ${{ secrets.DISCORD_WEBHOOK_A }}
          DISCORD_WEBHOOK_B: ${{ secrets.DISCORD_WEBHOOK_B }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f last_notified.json ]; then
            git add last_notified.json
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "chore: update notification history [skip ci]"
              git pull --rebase origin main
              git push origin main
            fi
          fi
