name: YouTube Monitor Automation

on:
  schedule:
    # 每 15 分鐘執行一次 (UTC 時間)
    - cron: '*/15 * * * *'
  workflow_dispatch: # 允許手動觸發測試

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許 Action 寫入與提交 JSON 檔案
    
    # 提前採用 Node.js 24 以消除警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # v4 目前仍相容，但建議保持關注

      - name: Set up Python
        uses: actions/setup-python@v5 # 升級到 v5 以支援最新環境
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Monitoring Script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          DISCORD_WEBHOOK_A: ${{ secrets.DISCORD_WEBHOOK_A }}
          DISCORD_WEBHOOK_B: ${{ secrets.DISCORD_WEBHOOK_B }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_notified.json
          # 檢查是否有變動，有的話才提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update last notified history" && git push)
