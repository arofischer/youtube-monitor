name: YouTube Monitor Automation

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必須確保有寫入權限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 獲取完整歷史以利於 push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Monitoring Script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          DISCORD_WEBHOOK_A: ${{ secrets.DISCORD_WEBHOOK_A }}
          DISCORD_WEBHOOK_B: ${{ secrets.DISCORD_WEBHOOK_B }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 檢查檔案是否存在，不存在則建立空的以避免 git add 失敗
          if [ ! -f last_notified.json ]; then
            echo "{}" > last_notified.json
          fi
          
          git add last_notified.json
          
          # 檢查是否有內容變更
          if git diff --staged --quiet; then
            echo "沒有紀錄更新，跳過提交。"
          else
            git commit -m "chore: update notification history [skip ci]"
            # 使用 GITHUB_TOKEN 確保有權限推送
            git push origin HEAD:${{ github.ref }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
